name: CI Pipeline

on:
  push:
    branches:
      - develop
      - release/*
    paths:
      - 'frontend/**'
      - 'services/**'

permissions: 
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    environment: github_terrafrom
    outputs:
      changed: ${{ steps.set-matrix.outputs.matrix }}
      short_sha: ${{ steps.short-sha.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 2

      - name: Azure Login
        uses: Azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Extract short SHA
        id: short-sha
        run: echo "sha=${{ github.sha }}" | cut -c1-5 >> $GITHUB_OUTPUT

      - name: Find changed folders and generate matrix
        id: set-matrix
        run: |
          CHANGED_FOLDERS=$(git diff --name-only HEAD^ HEAD | grep -E '^(frontend|services/)' | awk -F '/' '{if ($1=="services") print $1"/"$2; else print $1}' | sort -u)

          if [ -z "$CHANGED_FOLDERS" ]; then
            echo "No relevant services changed."
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            JSON_ARRAY=$(echo "$CHANGED_FOLDERS" | awk -F '/' '{print "{\"path\":\""$0"\",\"name\":\""($2==""?$1:$2)"\"}"}' | jq -s -c '.')
            echo "Detected changes: $JSON_ARRAY"
            echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT
          fi

  cicd-qualitygate:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.changed != '[]' && needs.detect-changes.outputs.changed != '' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.changed) }}
    uses: ./.github/workflows/template-cicd-qualitygate.yaml
    with:
      working_dir: ${{ matrix.service.path }}
      service_name: ${{ matrix.service.name }}

  cicd-build:
    needs:
      - detect-changes
      - cicd-qualitygate
    if: ${{ needs.detect-changes.outputs.changed != '[]' && needs.detect-changes.outputs.changed != '' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.changed) }}
    uses: ./.github/workflows/template-cicd-build.yaml
    with:
      working_dir: ${{ matrix.service.path }}
      image_name: ${{ matrix.service.name }}
      image_version: "${{github.ref_name }}-${{ needs.detect-changes.outputs.short_sha }}"
      client_id: ${{ secrets.AZURE_CLIENT_ID }}
      tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}


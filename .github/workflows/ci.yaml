name: "Create Service Image"

on:
  push:
    branches:
      - develop
      - release/*
    paths: 
      - 'frontend/**'
      - 'services/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      changed: ${{ steps.set-matrix.outputs.matrix }} 

    steps:
      - name: checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 2

      - name: Find changed folders and generate JSON
        id: set-matrix
        run: |
          
          CHANGED_FOLDERS=$(git diff --name-only HEAD^ HEAD | grep -E '^(frontend|services/)' | awk -F '/' '{if ($1=="services") print $1"/"$2; else print $1}' | sort -u)
          
          if [ -z "$CHANGED_FOLDERS" ]; then
            echo "No relevant services changed."
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            # Changed folders ki list ko JSON Array me convert karna (e.g., ["frontend", "services/service1"])
            JSON_ARRAY=$(echo "$CHANGED_FOLDERS" | jq -R -s -c 'split("\n")[:-1]')
            echo "Detected changes in: $JSON_ARRAY"
            echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT
          fi
      
  run-pipeline:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.changed != '[]' && needs.detect-changes.outputs.changed != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        working_dir: ${{ fromJson(needs.detect-changes.outputs.changed) }}
 
    uses: ./.github/workflows/Templates
    with:
      working_dir: ${{ matrix.working_dir }}
      service_name: ${{ matrix.working_dir == 'frontend' && 'frontend' || basename(matrix.working_dir) }}  

